<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบลงเวลาพนักงาน (Time Tracking)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="flex justify-center min-h-screen text-gray-800">

    <!-- Mobile Container -->
    <div class="w-full max-w-md bg-white shadow-2xl relative flex flex-col h-[100dvh] overflow-hidden">
        
        <!-- Header -->
        <header class="bg-blue-600 text-white p-6 rounded-b-3xl shadow-lg z-10 relative transition-all duration-300">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-semibold flex items-center gap-2">
                    <i data-lucide="clock" class="w-6 h-6"></i>
                    ระบบลงเวลา
                </h1>
                <div class="flex gap-2">
                    <button id="exportCsvBtn" class="hidden p-2 bg-blue-500 hover:bg-blue-400 rounded-full transition" title="ส่งออก CSV">
                        <i data-lucide="download" class="w-5 h-5"></i>
                    </button>
                    <button id="logoutBtn" class="hidden p-2 bg-rose-500 hover:bg-rose-400 rounded-full transition" title="ออกจากระบบ">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            
            <div class="text-center mt-6 mb-2">
                <div id="currentDate" class="text-blue-100 text-sm font-medium mb-1">กำลังโหลดวันที่...</div>
                <div id="currentTime" class="text-5xl font-bold tracking-wider font-mono">--:--:--</div>
                <div id="userGreeting" class="hidden mt-3 text-sm font-medium bg-white/20 inline-block px-4 py-1 rounded-full text-white"></div>
            </div>
        </header>

        <!-- Login Screen -->
        <main id="loginScreen" class="flex-1 overflow-y-auto no-scrollbar p-6 relative z-0 flex flex-col justify-center">
            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center" id="authTitle">เข้าสู่ระบบ</h2>
                <p class="text-sm text-gray-500 text-center mb-6" id="authSubtitle">กรุณาเข้าสู่ระบบเพื่อลงเวลาทำงาน</p>

                <form id="authForm" class="space-y-4" onsubmit="return false;">
                    <div id="nameField" class="hidden">
                        <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อ-นามสกุล</label>
                        <input type="text" id="regName" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" placeholder="ชื่อสำหรับแสดงในระบบ">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">อีเมล</label>
                        <input type="email" id="authEmail" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" placeholder="อีเมลของคุณ">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
                        <input type="password" id="authPassword" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" placeholder="รหัสผ่านอย่างน้อย 6 ตัว">
                    </div>
                    <button id="authSubmitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition shadow-md mt-2">
                        เข้าสู่ระบบ
                    </button>
                </form>

                <div class="mt-6 text-center text-sm text-gray-600">
                    <span id="authToggleText">ยังไม่มีบัญชีใช่หรือไม่?</span>
                    <button id="authToggleBtn" class="text-blue-600 font-semibold hover:underline ml-1">ลงทะเบียน</button>
                </div>
            </div>
        </main>

        <!-- Main Content -->
        <main id="appScreen" class="hidden flex-1 overflow-y-auto no-scrollbar p-6 pb-24 relative z-0 -mt-4 pt-8">
            
            <!-- User Info -->
            <div class="mb-4 bg-gray-50 p-4 rounded-2xl border border-gray-100 shadow-sm">
                <label class="block text-sm font-medium text-gray-600 mb-2">พนักงานที่เข้าสู่ระบบ</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="user-check" class="w-5 h-5 text-blue-500"></i>
                    </div>
                    <div id="loggedInUserName" class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl bg-gray-100 text-gray-700 font-medium overflow-hidden text-ellipsis whitespace-nowrap">
                        กำลังโหลด...
                    </div>
                </div>
            </div>

            <!-- Remark Input -->
            <div class="mb-8 bg-gray-50 p-4 rounded-2xl border border-gray-100 shadow-sm">
                <label class="block text-sm font-medium text-gray-600 mb-2" for="remark">หมายเหตุ (ถ้ามี)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="file-text" class="w-5 h-5 text-gray-400"></i>
                    </div>
                    <input type="text" id="remark" class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl leading-5 bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" placeholder="เช่น ทำงานนอกสถานที่, ลืมลงเวลา...">
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button id="btnClockIn" class="flex flex-col items-center justify-center gap-2 bg-green-500 hover:bg-green-600 text-white py-6 rounded-2xl shadow-md shadow-green-200 transition transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    <div class="bg-white/20 p-3 rounded-full">
                        <i data-lucide="log-in" class="w-8 h-8"></i>
                    </div>
                    <span class="font-semibold text-lg">เข้างาน</span>
                </button>
                
                <button id="btnClockOut" class="flex flex-col items-center justify-center gap-2 bg-rose-500 hover:bg-rose-600 text-white py-6 rounded-2xl shadow-md shadow-rose-200 transition transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    <div class="bg-white/20 p-3 rounded-full">
                        <i data-lucide="log-out" class="w-8 h-8"></i>
                    </div>
                    <span class="font-semibold text-lg">ออกงาน</span>
                </button>
            </div>

            <!-- History Section -->
            <div>
                <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2">
                    <i data-lucide="history" class="w-5 h-5"></i>
                    ประวัติของวันนี้
                </h2>
                <div id="historyList" class="space-y-3">
                    <!-- รายการจะถูกสร้างที่นี่ด้วย JavaScript -->
                    <div class="text-center text-gray-400 py-4 text-sm">ยังไม่มีข้อมูลการลงเวลา...</div>
                </div>
            </div>
            
        </main>
        
        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden">
            <i data-lucide="loader-2" class="w-10 h-10 text-blue-500 animate-spin mb-4"></i>
            <p class="text-gray-600 font-medium">กำลังประมวลผล...</p>
        </div>

    </div>

    <!-- Custom Modal (แทน Alert) -->
    <div id="customModal" class="fixed inset-0 z-50 flex items-center justify-center px-4 bg-gray-900/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl transform scale-95 transition-transform duration-300" id="modalContent">
            <div class="text-center">
                <div id="modalIcon" class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-blue-100 mb-4">
                    <i data-lucide="info" class="w-6 h-6 text-blue-600"></i>
                </div>
                <h3 class="text-lg font-semibold text-gray-900 mb-2" id="modalTitle">ข้อความ</h3>
                <p class="text-sm text-gray-500 mb-6" id="modalMessage">รายละเอียด</p>
                <button id="modalBtn" class="w-full inline-flex justify-center rounded-xl border border-transparent shadow-sm px-4 py-3 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none transition">
                    ตกลง
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, signOut, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. CONFIGURATION
        // ==========================================
        
        // Config ที่คุณให้มา
        const userFirebaseConfig = {
            apiKey: "AIzaSyBHuZGyY1F3v4rCrhrpt9YB90C0Ahh-stE",
            authDomain: "my-company-time-tracking.firebaseapp.com",
            projectId: "my-company-time-tracking",
            storageBucket: "my-company-time-tracking.firebasestorage.app",
            messagingSenderId: "758524847747",
            appId: "1:758524847747:web:2e5a49e4064334f1265db6",
            measurementId: "G-50SYJKTRT1"
        };

        // ตรวจสอบ Environment เพื่อให้ใช้งานบน Canvas ได้ (ถ้ามี) หรือใช้ของ User
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userFirebaseConfig;
        
        // URL ของ Google Apps Script Web App สำหรับส่งเข้า Google Sheets อัตโนมัติ
        // วิธีทำ: 1. สร้าง Google Sheets 2. ไปที่ Extensions > Apps Script 3. วางโค้ดด้านล่าง 4. Deploy เป็น Web App
        const GOOGLE_SHEETS_WEBHOOK_URL = ""; // <-- นำ URL ที่ได้จากการ Deploy มาวางที่นี่
        
        // ==========================================
        // 2. INITIALIZATION
        // ==========================================
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // กำหนด Path ของ Collection อย่างปลอดภัย
        const isCanvasEnv = typeof __app_id !== 'undefined';
        const appId = isCanvasEnv ? __app_id : 'my-company-app';
        const collectionPath = isCanvasEnv 
            ? `artifacts/${appId}/public/data/timelogs` 
            : 'timelogs'; // ใช้ path 'timelogs' ทั่วไปหากรันบนเซิร์ฟเวอร์จริง

        let currentUser = null;
        let allLogs = [];

        lucide.createIcons();

        // ==========================================
        // 3. UI FUNCTIONS
        // ==========================================
        const timeDisplay = document.getElementById('currentTime');
        const dateDisplay = document.getElementById('currentDate');
        const remarkInput = document.getElementById('remark');
        const historyList = document.getElementById('historyList');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        // UI Elements for Auth
        const loginScreen = document.getElementById('loginScreen');
        const appScreen = document.getElementById('appScreen');
        const exportCsvBtn = document.getElementById('exportCsvBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userGreeting = document.getElementById('userGreeting');
        const loggedInUserName = document.getElementById('loggedInUserName');
        
        // Auth Form Elements
        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const nameField = document.getElementById('nameField');
        const regName = document.getElementById('regName');
        const authEmail = document.getElementById('authEmail');
        const authPassword = document.getElementById('authPassword');
        const authSubmitBtn = document.getElementById('authSubmitBtn');
        const authToggleText = document.getElementById('authToggleText');
        const authToggleBtn = document.getElementById('authToggleBtn');
        
        let isLoginMode = true;

        // ระบบ Auth พื้นฐานสำหรับ Canvas Environment
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                }
            } catch (error) {
                console.error("Auth init error:", error);
            }
        };
        initAuth();

        // อัปเดตนาฬิกา
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const dateStr = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            timeDisplay.textContent = timeStr;
            dateDisplay.textContent = dateStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Modal (แทน Alert)
        const modal = document.getElementById('customModal');
        const modalContent = document.getElementById('modalContent');
        const modalIcon = document.getElementById('modalIcon');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        
        function showModal(title, message, type = 'info') {
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            
            if (type === 'success') {
                modalIcon.innerHTML = `<i data-lucide="check-circle" class="w-6 h-6 text-green-600"></i>`;
                modalIcon.className = "mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4";
            } else if (type === 'error') {
                modalIcon.innerHTML = `<i data-lucide="alert-circle" class="w-6 h-6 text-red-600"></i>`;
                modalIcon.className = "mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4";
            } else {
                modalIcon.innerHTML = `<i data-lucide="info" class="w-6 h-6 text-blue-600"></i>`;
                modalIcon.className = "mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-blue-100 mb-4";
            }
            lucide.createIcons();
            
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-95');
        }

        document.getElementById('modalBtn').addEventListener('click', () => {
            modal.classList.add('opacity-0', 'pointer-events-none');
            modalContent.classList.add('scale-95');
        });

        // แสดงผล History
        function renderHistory(data) {
            historyList.innerHTML = '';
            
            // กรองเอาเฉพาะของวันนี้ และเรียงจากล่าสุดไปเก่า
            const todayStr = new Date().toLocaleDateString('th-TH');
            let todayLogs = data.filter(log => log.date === todayStr);
            todayLogs.sort((a, b) => b.timestamp - a.timestamp);

            if (todayLogs.length === 0) {
                historyList.innerHTML = `<div class="text-center text-gray-400 py-4 text-sm bg-gray-50 rounded-xl border border-dashed border-gray-200">ไม่มีประวัติการลงเวลาในวันนี้</div>`;
                return;
            }

            todayLogs.forEach(log => {
                const isClockIn = log.type === 'IN';
                const iconColor = isClockIn ? 'text-green-500' : 'text-rose-500';
                const bgColor = isClockIn ? 'bg-green-50' : 'bg-rose-50';
                const iconName = isClockIn ? 'log-in' : 'log-out';
                const typeText = isClockIn ? 'เข้างาน' : 'ออกงาน';

                let extraInfoHtml = '';
                if (log.remark) {
                    extraInfoHtml += `<p class="text-xs text-gray-500 mt-1"><i data-lucide="file-text" class="w-3 h-3 inline"></i> ${log.remark}</p>`;
                }
                if (log.location) {
                    extraInfoHtml += `<a href="https://maps.google.com/?q=${log.location.lat},${log.location.lng}" target="_blank" class="text-xs text-blue-500 hover:underline mt-1 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i> ดูพิกัดบนแผนที่</a>`;
                }

                const logEl = document.createElement('div');
                logEl.className = 'flex items-center justify-between p-3 bg-white border border-gray-100 rounded-xl shadow-sm';
                logEl.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="p-2 rounded-lg ${bgColor}">
                            <i data-lucide="${iconName}" class="w-5 h-5 ${iconColor}"></i>
                        </div>
                        <div>
                            <p class="font-medium text-gray-800">${log.empName}</p>
                            <p class="text-xs text-gray-500">${typeText}</p>
                            ${extraInfoHtml}
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-semibold text-gray-900">${log.time}</p>
                    </div>
                `;
                historyList.appendChild(logEl);
            });
            lucide.createIcons();
        }

        // ==========================================
        // 4. CORE LOGIC (FIREBASE & SHEETS SYNC)
        // ==========================================
        
        // Sync ไปยัง Google Sheets
        async function syncToGoogleSheets(logData) {
            if (!GOOGLE_SHEETS_WEBHOOK_URL) return; // ข้ามหากไม่ได้ตั้งค่า URL
            
            try {
                await fetch(GOOGLE_SHEETS_WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors', // สำคัญสำหรับ Google Apps Script เพื่อไม่ให้ติดเรื่อง CORS
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(logData)
                });
                console.log("Synced to Google Sheets successfully");
            } catch (err) {
                console.error("Error syncing to sheets:", err);
            }
        }

        async function handleClockEvent(type) {
            const remark = remarkInput.value.trim();
            
            if (!currentUser) {
                showModal('ข้อผิดพลาด', 'ไม่พบข้อมูลผู้ใช้งาน กรุณาเข้าสู่ระบบใหม่', 'error');
                return;
            }

            const empName = currentUser.displayName || currentUser.email;

            loadingOverlay.classList.remove('hidden');
            
            // ขอดึงข้อมูลพิกัด GPS (ถ้าผู้ใช้ไม่อนุญาต ก็ยังบันทึกเวลาได้ตามปกติ)
            let locationData = null;
            try {
                if (navigator.geolocation) {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 10000, enableHighAccuracy: true });
                    });
                    locationData = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                }
            } catch (geoError) {
                console.warn("ไม่สามารถดึงตำแหน่ง GPS ได้:", geoError);
            }
            
            try {
                const now = new Date();
                const logData = {
                    uid: currentUser.uid,
                    empName: empName,
                    remark: remark,
                    location: locationData,
                    type: type, // 'IN' or 'OUT'
                    timestamp: now.getTime(),
                    date: now.toLocaleDateString('th-TH'),
                    time: now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
                    isoString: now.toISOString()
                };

                // บันทึกลง Firestore
                const colRef = collection(db, collectionPath);
                await addDoc(colRef, logData);

                // พยายามส่งไป Google Sheets ทันที (Background)
                syncToGoogleSheets(logData);

                remarkInput.value = ''; // เคลียร์ช่องหมายเหตุหลังกด

                loadingOverlay.classList.add('hidden');
                
                const typeTxt = type === 'IN' ? 'เข้างาน' : 'ออกงาน';
                showModal('สำเร็จ', `ลงเวลา${typeTxt}เรียบร้อยแล้วเวลา ${logData.time} น.`, 'success');

            } catch (error) {
                console.error("Error adding document: ", error);
                loadingOverlay.classList.add('hidden');
                
                if (error.code === 'permission-denied' || error.message.includes('Missing or insufficient permissions')) {
                    showModal('ตั้งค่า Firestore Rules', 'ไม่สามารถบันทึกได้: กรุณาไปที่ Firebase Console > Firestore Database > Rules แล้วเปลี่ยนเป็น allow read, write: if request.auth != null;', 'error');
                } else {
                    showModal('ข้อผิดพลาด', 'ไม่สามารถบันทึกข้อมูลได้ กรุณาลองใหม่', 'error');
                }
            }
        }

        // ==========================================
        // 5. EVENT LISTENERS & AUTH SETUP
        // ==========================================

        document.getElementById('btnClockIn').addEventListener('click', () => handleClockEvent('IN'));
        document.getElementById('btnClockOut').addEventListener('click', () => handleClockEvent('OUT'));

        // ดึงข้อมูลประวัติ
        function fetchLogs() {
            if (!currentUser) return;
            const colRef = collection(db, collectionPath);
            
            // อ่านข้อมูลทั้งหมด (ไม่ใช้ Query แบบซับซ้อนตามกฎ)
            onSnapshot(colRef, (snapshot) => {
                allLogs = [];
                snapshot.forEach((doc) => {
                    allLogs.push({ id: doc.id, ...doc.data() });
                });
                renderHistory(allLogs);
            }, (error) => {
                console.error("Error fetching logs:", error);
                if (error.code === 'permission-denied' || error.message.includes('Missing or insufficient permissions')) {
                    historyList.innerHTML = `<div class="text-center text-red-500 py-4 text-sm bg-red-50 rounded-xl border border-dashed border-red-200">ไม่สามารถโหลดข้อมูลได้: ติดปัญหาเรื่องสิทธิ์ Firestore Rules</div>`;
                    showModal('ตั้งค่า Firestore Rules', 'ระบบฐานข้อมูลถูกล็อกไว้ กรุณาไปที่ Firebase Console > Firestore Database > Rules แล้วแก้ไขตามคำแนะนำ', 'error');
                }
            });
        }

        // --- ระบบ Authentication (Login / Register / Logout) ---

        // สลับโหมด Login / Register
        authToggleBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                authTitle.textContent = 'เข้าสู่ระบบ';
                authSubtitle.textContent = 'กรุณาเข้าสู่ระบบเพื่อลงเวลาทำงาน';
                nameField.classList.add('hidden');
                authSubmitBtn.textContent = 'เข้าสู่ระบบ';
                authToggleText.textContent = 'ยังไม่มีบัญชีใช่หรือไม่?';
                authToggleBtn.textContent = 'ลงทะเบียน';
            } else {
                authTitle.textContent = 'ลงทะเบียนพนักงาน';
                authSubtitle.textContent = 'สร้างบัญชีใหม่สำหรับลงเวลา';
                nameField.classList.remove('hidden');
                authSubmitBtn.textContent = 'สร้างบัญชี';
                authToggleText.textContent = 'มีบัญชีอยู่แล้ว?';
                authToggleBtn.textContent = 'เข้าสู่ระบบ';
            }
        });

        // จัดการฟอร์ม Login/Register
        authSubmitBtn.addEventListener('click', async () => {
            const email = authEmail.value.trim();
            const password = authPassword.value;
            const name = regName.value.trim();

            if (!email || !password) {
                showModal('แจ้งเตือน', 'กรุณากรอกอีเมลและรหัสผ่านให้ครบถ้วน', 'error');
                return;
            }

            loadingOverlay.classList.remove('hidden');

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    if (!name) {
                        loadingOverlay.classList.add('hidden');
                        showModal('แจ้งเตือน', 'กรุณากรอกชื่อ-นามสกุล', 'error');
                        return;
                    }
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(userCredential.user, { displayName: name });
                    currentUser = auth.currentUser;
                }
                
                authEmail.value = '';
                authPassword.value = '';
                regName.value = '';
                
            } catch (error) {
                console.error("Auth error:", error);
                let errorMsg = 'เกิดข้อผิดพลาดในการตรวจสอบสิทธิ์';
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/invalid-email' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    errorMsg = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
                } else if (error.code === 'auth/email-already-in-use') {
                    errorMsg = 'อีเมลนี้ถูกใช้งานแล้ว';
                } else if (error.code === 'auth/weak-password') {
                    errorMsg = 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร';
                } else if (error.code === 'auth/operation-not-allowed') {
                    errorMsg = 'ยังไม่ได้เปิดใช้งาน Email/Password Auth กรุณาไปที่ Firebase Console -> Authentication -> Sign-in method แล้วเปิดใช้งาน "Email/Password" ครับ';
                } else {
                    errorMsg = error.message;
                }
                showModal('ข้อผิดพลาด', errorMsg, 'error');
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        });

        // จัดการออกจากระบบ
        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
            } catch (error) {
                console.error("Logout error:", error);
            }
        });

        // ตรวจสถานะ UI ตาม User
        function updateUIState(user) {
            if (user && !user.isAnonymous) {
                // Logged In
                loginScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                exportCsvBtn.classList.remove('hidden');
                logoutBtn.classList.remove('hidden');
                userGreeting.classList.remove('hidden');
                
                const displayName = user.displayName || user.email;
                userGreeting.textContent = `สวัสดี, ${displayName}`;
                loggedInUserName.textContent = displayName;
            } else {
                // Logged Out
                loginScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
                exportCsvBtn.classList.add('hidden');
                logoutBtn.classList.add('hidden');
                userGreeting.classList.add('hidden');
            }
        }

        // ตรวจสอบสถานะ User จาก Firebase
        onAuthStateChanged(auth, (user) => {
            if (user && user.isAnonymous) {
                // หากเคยเข้าสู่ระบบแบบไม่ระบุตัวตนจากเวอร์ชันเก่า ให้ล็อกเอาต์ทิ้ง
                signOut(auth);
                return;
            }

            currentUser = user;
            updateUIState(user);

            if (user) {
                fetchLogs();
            } else {
                historyList.innerHTML = `<div class="text-center text-gray-400 py-4 text-sm bg-gray-50 rounded-xl border border-dashed border-gray-200">กรุณาเข้าสู่ระบบเพื่อดูประวัติ</div>`;
                allLogs = [];
            }
        });

        // ฟังก์ชัน Export CSV เป็น Backup
        document.getElementById('exportCsvBtn').addEventListener('click', () => {
            if (allLogs.length === 0) {
                showModal('แจ้งเตือน', 'ยังไม่มีข้อมูลสำหรับส่งออก', 'info');
                return;
            }
            
            // สร้าง Header ของ CSV (รองรับภาษาไทย)
            let csvContent = "\uFEFF"; // BOM for Excel to read UTF-8 properly
            csvContent += "วันที่,เวลา,ประเภท,ชื่อพนักงาน,หมายเหตุ,ละติจูด,ลองจิจูด\n";
            
            // นำข้อมูลมาแปลงเป็นแถว
            const sortedLogs = [...allLogs].sort((a, b) => b.timestamp - a.timestamp);
            sortedLogs.forEach(row => {
                const typeStr = row.type === 'IN' ? 'เข้างาน' : 'ออกงาน';
                const remarkStr = row.remark ? `"${row.remark}"` : "";
                const lat = row.location ? row.location.lat : "";
                const lng = row.location ? row.location.lng : "";
                csvContent += `${row.date},${row.time},${typeStr},"${row.empName}",${remarkStr},${lat},${lng}\n`;
            });
            
            // สร้างปุ่มดาวน์โหลดจำลองและคลิก
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `บันทึกเวลาพนักงาน_${new Date().toLocaleDateString('th-TH')}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

    </script>
</body>
</html>
