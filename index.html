<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Time Tracking App</title>
    <style>
        /* สไตล์แบบ Flat 2010s & ไอโซเมตริก (เงาแข็ง) */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #F4F4F0; /* สีพื้นหลังสไตล์กระดาษ/มินิมอล */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .header {
            margin-top: 40px;
            margin-bottom: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            color: #333;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ปุ่มกดสไตล์ Isometric Flat */
        .btn {
            width: 100%;
            max-width: 300px;
            padding: 20px;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            border: 3px solid #222;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* สีและเงาปุ่มเข้างาน */
        .btn-checkin {
            background-color: #A8E6CF; /* สีเขียวพาสเทล Flat */
            color: #222;
            box-shadow: 6px 6px 0px #222; /* เงาแข็งแบบ Isometric */
        }

        /* สีและเงาปุ่มออกงาน */
        .btn-checkout {
            background-color: #FF8B94; /* สีแดง/ชมพูพาสเทล Flat */
            color: #222;
            box-shadow: 6px 6px 0px #222;
        }

        /* แอนิเมชันตอนกด (ยุบตัวลงไปหาเงา) */
        .btn:active {
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px #222;
        }

        /* กล่องแสดงสถานะ */
        .status-box {
            width: 100%;
            max-width: 300px;
            margin-top: 30px;
            padding: 15px;
            background-color: #fff;
            border: 3px solid #222;
            box-shadow: 4px 4px 0px #222;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #555;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>WORK LOG</h1>
    </div>

    <button class="btn btn-checkin" id="btn-in">Check In</button>
    <button class="btn btn-checkout" id="btn-out">Check Out</button>

    <div class="status-box" id="status-display">
        สถานะ: รอการบันทึกเวลา
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 1. นำ Config จาก Firebase Console มาใส่ตรงนี้
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // 2. เริ่มต้นระบบ Firebase และ Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const statusDisplay = document.getElementById('status-display');

        // ฟังก์ชันบันทึกข้อมูล
        async function logTime(type) {
            statusDisplay.innerText = "กำลังบันทึกข้อมูล...";
            try {
                // จำลองชื่อพนักงาน (ของจริงอาจดึงจากระบบ Login)
                const employeeName = "พนักงาน 01"; 
                
                // บันทึกลง Firestore ในคอลเล็กชันชื่อ "time_logs"
                await addDoc(collection(db, "time_logs"), {
                    employee: employeeName,
                    action: type,
                    timestamp: serverTimestamp() // ใช้เวลาจากเซิร์ฟเวอร์ Firebase ตรงๆ
                });

                const timeNow = new Date().toLocaleTimeString('th-TH');
                statusDisplay.innerText = `บันทึก "${type}" สำเร็จ!\nเวลา: ${timeNow}`;
                statusDisplay.style.color = "#4CAF50";

            } catch (error) {
                console.error("Error adding document: ", error);
                statusDisplay.innerText = "เกิดข้อผิดพลาดในการบันทึก";
                statusDisplay.style.color = "red";
            }
        }

        // จับเหตุการณ์การกดปุ่ม
        document.getElementById('btn-in').addEventListener('click', () => logTime("เข้างาน"));
        document.getElementById('btn-out').addEventListener('click', () => logTime("ออกงาน"));
    </script>
</body>
</html>
