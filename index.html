<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeTrack (Professional UI)</title>
    <style>
        /* --- Modern Variables 2025 --- */
        :root {
            --primary: #4f46e5;
            --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --success-gradient: linear-gradient(135deg, #059669 0%, #10b981 100%);
            --danger-gradient: linear-gradient(135deg, #e11d48 0%, #f43f5e 100%);
            --warning-gradient: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
            
            --bg-body: #0f172a;
            --bg-app: #f8fafc;
            
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.6);
            
            --text-main: #1e293b;
            --text-muted: #64748b;
            --tab-bar-bg: rgba(255, 255, 255, 0.95);
            
            --radius-xl: 24px;
            --radius-lg: 14px;
            --radius-pill: 999px;
            
            --shadow-glass: 0 -8px 25px rgba(0,0,0,0.04);
            --shadow-glow: 0 8px 20px -6px rgba(79, 70, 229, 0.4);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-body); color: var(--text-main);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            touch-action: manipulation; 
        }

        /* --- โครงสร้างหลักแบบ Flex Stacking --- */
        #app-container {
            width: 100%; max-width: 414px; 
            height: 100dvh; max-height: 896px;
            background-color: var(--bg-app); position: relative; overflow: hidden;
            display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        @media (max-width: 414px) {
            #app-container { max-height: 100dvh; box-shadow: none; border-radius: 0; }
        }

        /* Background Orbs */
        .bg-orb {
            position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.5;
            z-index: 0; pointer-events: none; animation: floatOrb 12s ease-in-out infinite alternate;
        }
        .orb-1 { top: -10%; right: -10%; width: 60vmin; height: 60vmin; background: #e0e7ff; }
        .orb-2 { bottom: 10%; left: -10%; width: 70vmin; height: 70vmin; background: #fae8ff; }

        @keyframes floatOrb { 0% { transform: translateY(0); } 100% { transform: translateY(20px); } }

        /* --- 1. Top Bar (Header) --- */
        header {
            flex: 0 0 auto; 
            padding: clamp(1rem, 4vw, 1.5rem); position: relative; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-actions { display: flex; gap: 0.5rem; align-items: center; }
        .user-role-badge { font-size: 0.7rem; padding: 0.3rem 0.8rem; border-radius: var(--radius-pill); font-weight: 700; text-transform: uppercase; }
        .role-admin { background-color: rgba(79, 70, 229, 0.15); color: var(--primary); }
        .role-emp { background-color: rgba(5, 150, 105, 0.15); color: #059669; }
        
        .btn-logout {
            background: rgba(225, 29, 72, 0.1); border: none; color: #e11d48;
            font-size: 0.75rem; font-weight: 700; cursor: pointer; padding: 0.4rem 0.8rem; border-radius: var(--radius-pill);
            transition: 0.2s; display: none;
        }
        .btn-logout:active { transform: scale(0.95); }

        /* --- 2. Scrollable Content (พื้นที่ดูข้อมูลหลัก) --- */
        main {
            flex: 1 1 auto; 
            overflow-y: auto; -webkit-overflow-scrolling: touch; 
            padding: 0 clamp(1.2rem, 4vw, 1.5rem); 
            padding-bottom: 1.5rem; 
            box-sizing: border-box; position: relative; z-index: 10;
            -ms-overflow-style: none; scrollbar-width: none;
            display: flex; flex-direction: column;
        }
        main::-webkit-scrollbar { display: none; }

        /* --- 3. Thumb Zone Actions (แผงควบคุมด้านล่าง) --- */
        #thumb-actions-container {
            flex: 0 0 auto; z-index: 40;
            background: var(--glass-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid var(--glass-border); border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            box-shadow: var(--shadow-glass);
        }
        .thumb-actions {
            padding: clamp(1.2rem, 4vw, 1.5rem); 
            padding-bottom: max(1.2rem, env(safe-area-inset-bottom));
            display: flex; flex-direction: column; gap: 0.75rem;
        }
        
        /* --- 4. Bottom Tab Bar --- */
        #bottomNav {
            flex: 0 0 auto; display: flex; background-color: var(--tab-bar-bg);
            border-top: 1px solid var(--glass-border); padding: 0.4rem 0.5rem; 
            padding-bottom: max(0.4rem, env(safe-area-inset-bottom)); z-index: 50;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 0.4rem 0; color: var(--text-muted); text-decoration: none; font-size: 0.65rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s; border-radius: var(--radius-lg);
        }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 2px; transition: transform 0.2s; }
        .nav-item.active { background: var(--text-main); color: white; }
        .nav-item.active svg { transform: translateY(-2px); }

        /* --- UI Components พื้นฐาน --- */
        .card {
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: var(--radius-xl); 
            padding: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.02); text-align: center; margin-bottom: 1rem;
        }
        .section-title { font-size: 1.05rem; font-weight: 800; text-align: left; margin: 1rem 0 0.5rem 0; color: var(--text-main); letter-spacing: -0.3px; }

        /* ฟอร์มและปุ่ม */
        .native-input, .native-select, .native-textarea {
            width: 100%; padding: 1.1rem 1.2rem; border-radius: var(--radius-lg); border: 1px solid var(--glass-border);
            background-color: rgba(255, 255, 255, 0.9); font-size: 1rem; font-family: inherit; font-weight: 500;
            color: var(--text-main); outline: none; box-sizing: border-box; transition: all 0.2s; margin-bottom: 1rem;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }
        .native-textarea { resize: vertical; min-height: 80px; }
        .native-input:focus, .native-select:focus, .native-textarea:focus { border-color: var(--primary); background-color: #fff; box-shadow: var(--shadow-glow); }

        .btn {
            width: 100%; border: none; padding: 1.2rem; font-size: 1.05rem; font-weight: 700;
            border-radius: var(--radius-lg); cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; justify-content: center; align-items: center; gap: 0.5rem;
        }
        .btn:active { transform: scale(0.97); opacity: 0.9; }
        .btn-primary { background: var(--primary-gradient); color: white; box-shadow: var(--shadow-glow); }
        .btn-success { background: var(--success-gradient); color: white; box-shadow: 0 6px 20px -6px rgba(5, 150, 105, 0.5); }
        .btn-danger { background: var(--danger-gradient); color: white; box-shadow: 0 6px 20px -6px rgba(225, 29, 72, 0.5); }
        .btn-outline { background: rgba(255, 255, 255, 0.5); color: var(--text-main); border: 1px solid var(--glass-border); }

        /* Typography */
        .live-clock { font-size: clamp(3.5rem, 12vw, 4.5rem); font-weight: 300; margin: 0; font-variant-numeric: tabular-nums; letter-spacing: -2px; color: var(--text-main); }
        .live-date { color: var(--primary); font-size: 0.95rem; font-weight: 700; margin-top: 0.5rem; }
        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 0.4rem 1rem; border-radius: var(--radius-pill); font-size: 0.8rem; font-weight: 700; background: var(--glass-bg); border: 1px solid var(--glass-border); }
        
        /* List View */
        .list-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.2rem; background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); }
        .item-main { display: flex; flex-direction: column; text-align: left; }
        .item-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; color: var(--text-main); }
        .item-subtitle { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
        
        .empty-state { text-align: center; padding: 2rem 1rem; color: var(--text-muted); font-size: 0.9rem; font-weight: 500;}

        /* --- Numpad แบบมืออาชีพ (ไม่มีขอบวงกลม เน้นความคลีน) --- */
        .pin-dots { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1rem; }
        .pin-dot { width: 16px; height: 16px; border-radius: 50%; background: rgba(0,0,0,0.05); transition: all 0.2s;}
        .pin-dot.filled { background: var(--primary); transform: scale(1.1); box-shadow: 0 0 10px rgba(79, 70, 229, 0.4); }
        .pin-dot.error { background: #e11d48; box-shadow: 0 0 10px rgba(225, 29, 72, 0.4); }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake-animation { animation: shake 0.4s ease-in-out; }
        
        .numpad { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 0.5rem; max-width: 300px; width: 100%; margin: 0 auto; 
        }
        .numpad-btn { 
            background: transparent; border: none; border-radius: 50%; 
            aspect-ratio: 1/1; font-size: clamp(1.8rem, 6vw, 2.2rem); 
            font-weight: 400; color: var(--text-main); /* ฟอนต์บางลง ดูพรีเมียม */
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: background-color 0.2s; 
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .numpad-btn:active { background: rgba(0,0,0,0.05); }
        .numpad-btn.control { font-size: 1.1rem; font-weight: 600; color: var(--text-muted); }
        
        .req-badge { font-size: 0.7rem; font-weight: 700; padding: 4px 8px; border-radius: var(--radius-pill); white-space: nowrap; }
        .badge-pending { background: rgba(245, 158, 11, 0.1); color: #d97706; }
        .badge-approved { background: rgba(16, 185, 129, 0.1); color: #059669; }
        .badge-rejected { background: rgba(225, 29, 72, 0.1); color: #e11d48; }

    </style>
</head>
<body>

    <div id="app-container">
        <!-- Background Elements -->
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>

        <!-- 1. Header -->
        <header>
            <div class="logo">TimeTrack</div>
            <div class="header-actions">
                <div id="roleBadge"></div>
                <button class="btn-logout" id="btnLogout" onclick="logout()">ออกระบบ</button>
            </div>
        </header>

        <!-- 2. Scrollable Content Zone -->
        <main id="app-content"></main>

        <!-- 3. Thumb Action Zone -->
        <div id="thumb-actions-container"></div>

        <!-- 4. Bottom Tab Bar -->
        <nav class="bottom-nav" id="bottomNav" style="display: none;"></nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHuZGyY1F3v4rCrhrpt9YB90C0Ahh-stE",
            authDomain: "my-company-time-tracking.firebaseapp.com",
            projectId: "my-company-time-tracking",
            storageBucket: "my-company-time-tracking.firebasestorage.app",
            messagingSenderId: "758524847747",
            appId: "1:758524847747:web:2e5a49e4064334f1265db6",
            measurementId: "G-50SYJKTRT1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        /* =========================================
           ส่วนที่ 1: การจัดการข้อมูลและสถานะ
           ========================================= */
        let records = [];
        let employees = [];
        let requests = []; 
        let adminPin = null; 
        let currentUser = JSON.parse(sessionStorage.getItem('currentUser')) || null;
        
        let isReady = false;
        let loadedFlags = { emp: false, rec: false, sys: false, req: false };
        const contentDiv = document.getElementById('app-content');
        const thumbDiv = document.getElementById('thumb-actions-container');
        const bottomNav = document.getElementById('bottomNav');
        const roleBadge = document.getElementById('roleBadge');
        const btnLogout = document.getElementById('btnLogout');
        let clockInterval;

        let currentPin = "";
        let pinTargetId = null;

        contentDiv.innerHTML = '<div style="flex:1; display:flex; align-items:center; justify-content:center;"><div class="live-clock" style="font-size:1.5rem; font-weight:600;">เชื่อมต่อระบบ...</div></div>';
        
        signInAnonymously(auth).then(() => { setupRealtimeListeners(); })
        .catch(err => { contentDiv.innerHTML = '<div class="empty-state" style="color: #e11d48;">เชื่อมต่อล้มเหลว กรุณาเช็คอินเทอร์เน็ต</div>'; });

        function checkReady() {
            if (loadedFlags.emp && loadedFlags.rec && loadedFlags.sys && loadedFlags.req && !isReady) {
                isReady = true; updateHeaderAndNav(); handleRouting();
            }
        }

        function setupRealtimeListeners() {
            onSnapshot(collection(db, "employees"), (snap) => {
                employees = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                loadedFlags.emp = true; if(isReady) refreshCurrentView(); else checkReady();
            });
            onSnapshot(collection(db, "timeRecords"), (snap) => {
                records = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                records.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                loadedFlags.rec = true; if(isReady) refreshCurrentView(); else checkReady();
            });
            onSnapshot(collection(db, "system"), (snap) => {
                const adminDoc = snap.docs.find(d => d.id === 'settings');
                adminPin = adminDoc ? adminDoc.data().adminPin : null;
                loadedFlags.sys = true; if(isReady) refreshCurrentView(); else checkReady();
            });
            onSnapshot(collection(db, "requests"), (snap) => {
                requests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                requests.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)); 
                loadedFlags.req = true; if(isReady) refreshCurrentView(); else checkReady();
            });
        }

        function refreshCurrentView() {
            const page = window.location.hash.replace('#', '');
            if (page) navigateTo(page, false);
        }

        function getEmployeeStatus(empId) {
            const empRecords = records.filter(r => r.empId === empId);
            return empRecords.length === 0 ? 'OUT' : empRecords[empRecords.length - 1].type;
        }

        /* =========================================
           ส่วนส่งออกฟังก์ชัน Global
           ========================================= */
        window.pressNumpad = function(val) {
            if (val === 'C') currentPin = "";
            else if (val === '<') currentPin = currentPin.slice(0, -1);
            else if (currentPin.length < 4) currentPin += val;
            updatePinUI();
            if (currentPin.length === 4) setTimeout(() => verifyPinSubmit(), 100);
        };

        function updatePinUI() {
            const dotsContainer = document.getElementById('pin-dots-container');
            if(!dotsContainer) return;
            let dotsHTML = '';
            for(let i=0; i<4; i++) {
                const filled = i < currentPin.length ? 'filled' : '';
                dotsHTML += `<div class="pin-dot ${filled}"></div>`;
            }
            dotsContainer.innerHTML = dotsHTML;
        }

        function showPinError() {
            const dotsContainer = document.getElementById('pin-dots-container');
            if(!dotsContainer) return;
            dotsContainer.innerHTML = `<div class="pin-dot error"></div><div class="pin-dot error"></div><div class="pin-dot error"></div><div class="pin-dot error"></div>`;
            dotsContainer.classList.add('shake-animation');
            setTimeout(() => { dotsContainer.classList.remove('shake-animation'); currentPin = ""; updatePinUI(); }, 400);
        }

        function verifyPinSubmit() {
            if (pinTargetId === 'setup') {
                setDoc(doc(db, "system", "settings"), { adminPin: currentPin });
                adminPin = currentPin; navigateTo('login'); return;
            } 
            if (currentPin === adminPin) {
                currentUser = { role: 'admin' }; sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateHeaderAndNav(); navigateTo('admin-dash');
            } else {
                const emp = employees.find(e => e.pin === currentPin);
                if (emp) {
                    currentUser = { role: 'emp', id: emp.id, name: emp.name };
                    sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
                    updateHeaderAndNav(); navigateTo('emp-dash');
                } else showPinError();
            }
        }

        window.recordTime = async function(type) {
            if (!currentUser || currentUser.role !== 'emp') return;
            const emp = employees.find(e => e.id === currentUser.id);
            if (!emp) return;

            const now = new Date();
            await addDoc(collection(db, "timeRecords"), {
                empId: emp.id, empName: emp.name, type: type,
                timestamp: now.toISOString(),
                timeString: now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
                dateString: now.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' })
            });
            alert(`บันทึกเวลา${type === 'IN' ? 'เข้า' : 'ออก'}งาน สำเร็จ!`);
        };

        window.submitLeave = async function() {
            const type = document.getElementById('leaveType').value;
            const date = document.getElementById('leaveDate').value;
            const reason = document.getElementById('leaveReason').value;
            if(!type || !date) return alert('กรุณากรอกข้อมูลให้ครบถ้วน');

            await addDoc(collection(db, "requests"), {
                empId: currentUser.id, empName: currentUser.name, reqType: 'LEAVE',
                leaveType: type, date: date, reason: reason, status: 'PENDING', timestamp: new Date().toISOString()
            });
            document.getElementById('leaveDate').value = ''; document.getElementById('leaveReason').value = '';
            alert('ส่งคำขอสำเร็จ');
        };

        window.submitSwap = async function() {
            const targetEmpId = document.getElementById('swapEmp').value;
            const date = document.getElementById('swapDate').value;
            const reason = document.getElementById('swapReason').value;
            if(!targetEmpId || !date) return alert('กรุณาระบุคนที่จะสลับและวันที่');
            
            const targetEmp = employees.find(e => e.id === targetEmpId);
            await addDoc(collection(db, "requests"), {
                empId: currentUser.id, empName: currentUser.name, reqType: 'SWAP',
                targetEmpId: targetEmp.id, targetEmpName: targetEmp.name,
                date: date, reason: reason, status: 'PENDING', timestamp: new Date().toISOString()
            });
            document.getElementById('swapDate').value = ''; document.getElementById('swapReason').value = '';
            alert('ส่งคำขอสลับวันหยุดสำเร็จ');
        };

        window.updateReqStatus = async function(reqId, status) {
            await updateDoc(doc(db, "requests", reqId), { status: status });
        };

        window.logout = function() {
            sessionStorage.removeItem('currentUser'); currentUser = null;
            clearInterval(clockInterval); updateHeaderAndNav(); navigateTo('login');
        };

        window.handleAddEmployee = async function() {
            const name = document.getElementById('newEmpName').value.trim();
            const pin = document.getElementById('newEmpPin').value;
            if (!name) return alert('กรุณาระบุชื่อ');
            if (pin.length !== 4 || isNaN(pin)) return alert('กรุณาตั้งรหัส PIN 4 หลัก');
            if (pin === adminPin) return alert('รหัส PIN ซ้ำกับแอดมิน');
            if (employees.some(e => e.pin === pin)) return alert('รหัส PIN มีคนใช้งานแล้ว');

            await addDoc(collection(db, "employees"), { name, pin });
            document.getElementById('newEmpName').value = ''; document.getElementById('newEmpPin').value = '';
            alert('เพิ่มพนักงานเรียบร้อย');
        };

        window.handleDeleteEmployee = async function(id) {
            if (confirm('ยืนยันการลบพนักงานรายนี้?')) await deleteDoc(doc(db, "employees", id));
        };

        window.navigateTo = navigateTo;

        /* =========================================
           ส่วนที่ 2: การควบคุม UI แกนหลัก
           ========================================= */
        function updateHeaderAndNav() {
            if (!currentUser) {
                bottomNav.style.display = 'none'; roleBadge.innerHTML = ''; btnLogout.style.display = 'none'; return;
            }
            
            bottomNav.style.display = 'flex';
            btnLogout.style.display = 'block';

            if (currentUser.role === 'admin') {
                roleBadge.innerHTML = '<span class="user-role-badge role-admin">Admin</span>';
                bottomNav.innerHTML = `
                    <a class="nav-item" onclick="navigateTo('admin-dash')" id="nav-admin-dash"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>แดชบอร์ด</a>
                    <a class="nav-item" onclick="navigateTo('admin-emp')" id="nav-admin-emp"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>พนักงาน</a>
                    <a class="nav-item" onclick="navigateTo('admin-req')" id="nav-admin-req"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>คำขอ</a>
                `;
            } else if (currentUser.role === 'emp') {
                roleBadge.innerHTML = '<span class="user-role-badge role-emp">Staff</span>';
                bottomNav.innerHTML = `
                    <a class="nav-item" onclick="navigateTo('emp-dash')" id="nav-emp-dash"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>ลงเวลา</a>
                    <a class="nav-item" onclick="navigateTo('emp-leave')" id="nav-emp-leave"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>ลางาน</a>
                    <a class="nav-item" onclick="navigateTo('emp-swap')" id="nav-emp-swap"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>สลับวันหยุด</a>
                `;
            }
        }

        function startClock() {
            clearInterval(clockInterval);
            const tick = () => {
                const now = new Date();
                const clockEl = document.getElementById('clockDisplay');
                const dateEl = document.getElementById('dateDisplay');
                if(clockEl) clockEl.textContent = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }); 
                if(dateEl) dateEl.textContent = now.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long' });
            };
            tick();
            clockInterval = setInterval(tick, 1000);
        }

        function getNumpadHTML() {
            return `
                <div class="numpad">
                    <div class="numpad-btn" onclick="pressNumpad('1')">1</div>
                    <div class="numpad-btn" onclick="pressNumpad('2')">2</div>
                    <div class="numpad-btn" onclick="pressNumpad('3')">3</div>
                    <div class="numpad-btn" onclick="pressNumpad('4')">4</div>
                    <div class="numpad-btn" onclick="pressNumpad('5')">5</div>
                    <div class="numpad-btn" onclick="pressNumpad('6')">6</div>
                    <div class="numpad-btn" onclick="pressNumpad('7')">7</div>
                    <div class="numpad-btn" onclick="pressNumpad('8')">8</div>
                    <div class="numpad-btn" onclick="pressNumpad('9')">9</div>
                    <div class="numpad-btn control" onclick="pressNumpad('C')">ล้าง</div>
                    <div class="numpad-btn" onclick="pressNumpad('0')">0</div>
                    <div class="numpad-btn control" onclick="pressNumpad('<')">ลบ</div>
                </div>
            `;
        }

        function getStatusBadgeHtml(status) {
            if(status === 'PENDING') return `<span class="req-badge badge-pending">รออนุมัติ</span>`;
            if(status === 'APPROVED') return `<span class="req-badge badge-approved">อนุมัติแล้ว</span>`;
            if(status === 'REJECTED') return `<span class="req-badge badge-rejected">ไม่อนุมัติ</span>`;
            return '';
        }

        /* =========================================
           ส่วนที่ 3: ระบบ Kiosk Login (Lock Screen Style)
           ========================================= */
        function renderSetup() {
            currentPin = ""; pinTargetId = 'setup'; thumbDiv.innerHTML = '';
            contentDiv.innerHTML = `
                <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                    <h2 style="margin: 0; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px;">ตั้งค่าระบบ</h2>
                    <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.95rem;">กำหนด PIN 4 หลักสำหรับผู้ดูแล</p>
                    <div class="pin-dots" id="pin-dots-container" style="margin-top: 1.5rem;">
                        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
                    </div>
                </div>
            `;
            thumbDiv.innerHTML = `
                <div class="thumb-actions" style="background: transparent; border: none; box-shadow: none;">
                    ${getNumpadHTML()}
                </div>
            `;
        }

        function renderLogin() {
            currentPin = ""; pinTargetId = null; thumbDiv.innerHTML = '';
            
            // หน้าจอหลัก (แยกส่วนแสดงผล)
            contentDiv.innerHTML = `
                <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                    <div class="live-clock" id="clockDisplay">00:00</div>
                    <div class="live-date" id="dateDisplay">--</div>
                    
                    <div style="margin-top: 2.5rem; display: flex; flex-direction: column; align-items: center;">
                        <p style="color: var(--text-main); font-size: 1rem; font-weight: 600; margin: 0;">กรุณากดรหัสผ่าน</p>
                        <div class="pin-dots" id="pin-dots-container" style="margin-top: 1rem;">
                            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
                        </div>
                    </div>
                </div>
            `;
            startClock();
            
            // Thumb Zone (เฉพาะแป้นตัวเลข)
            thumbDiv.innerHTML = `
                <div class="thumb-actions" style="background: transparent; border: none; box-shadow: none; padding-top: 0;">
                    ${getNumpadHTML()}
                </div>
            `;
        }

        /* =========================================
           ส่วนที่ 4: Views ฝั่งพนักงาน (Employee)
           ========================================= */
        function renderEmpDashboard() {
            thumbDiv.innerHTML = '';
            const status = getEmployeeStatus(currentUser.id);
            const isClockedIn = status === 'IN';

            let statusHTML = isClockedIn ? `<span style="color: #059669; font-weight:800;">กำลังทำงาน</span>` : `<span style="color: var(--text-muted); font-weight:800;">ยังไม่เข้างาน</span>`;
            let buttonHTML = isClockedIn 
                ? `<button class="btn btn-danger" style="padding: 1.5rem; font-size: 1.1rem;" onclick="recordTime('OUT')">บันทึกเวลาออกงาน</button>`
                : `<button class="btn btn-success" style="padding: 1.5rem; font-size: 1.1rem;" onclick="recordTime('IN')">บันทึกเวลาเข้างาน</button>`;

            const myRecords = records.filter(r => r.empId === currentUser.id).reverse().slice(0, 3);
            let recentHistoryHTML = '';
            if (myRecords.length > 0) {
                let listItems = '';
                myRecords.forEach(rec => {
                    const isTypeIn = rec.type === 'IN';
                    listItems += `
                        <div class="list-item" style="padding: 0.8rem 1rem; margin-bottom: 0.5rem;">
                            <span style="font-weight: 600; font-size: 0.9rem;">${rec.dateString} ${rec.timeString}</span>
                            <span style="color: ${isTypeIn ? '#059669' : 'var(--text-muted)'}; font-weight: 700; font-size: 0.8rem; background: rgba(0,0,0,0.03); padding: 4px 10px; border-radius: var(--radius-pill);">${isTypeIn ? 'เข้างาน' : 'ออกงาน'}</span>
                        </div>`;
                });
                recentHistoryHTML = `<div class="section-title" style="margin-top: 1.5rem;">ประวัติลงเวลาล่าสุด</div>${listItems}`;
            }

            contentDiv.innerHTML = `
                <div style="text-align:center; padding-top: 1rem;">
                    <h3 style="margin:0; color: var(--text-muted); font-weight: 500; font-size: 1rem;">สวัสดี, ${currentUser.name}</h3>
                    <div style="margin-top: 0.25rem; font-size: 0.9rem;">สถานะ: ${statusHTML}</div>
                    <div class="live-clock" id="clockDisplay" style="margin: 0.5rem 0; font-size: 3rem;">00:00</div>
                </div>
                ${recentHistoryHTML}
            `;
            startClock();

            thumbDiv.innerHTML = `
                <div class="thumb-actions">
                    ${buttonHTML}
                </div>
            `;
        }

        function renderEmpLeave() {
            thumbDiv.innerHTML = '';
            const myLeaves = requests.filter(r => r.empId === currentUser.id && r.reqType === 'LEAVE');
            let historyHtml = myLeaves.length === 0 ? `<div class="empty-state">ไม่มีประวัติการลางาน</div>` : `<div class="list-group">`;
            myLeaves.forEach(req => {
                historyHtml += `
                    <div class="list-item">
                        <div class="item-main">
                            <span class="item-title">${req.leaveType} (${req.date})</span>
                            <span class="item-subtitle">${req.reason || '-'}</span>
                        </div>
                        ${getStatusBadgeHtml(req.status)}
                    </div>`;
            });
            if(myLeaves.length > 0) historyHtml += `</div>`;

            // ย้ายฟอร์มกรอกมาไว้ที่หน้าจอหลัก (ป้องกันคีย์บอร์ดบัง)
            contentDiv.innerHTML = `
                <div class="card" style="text-align: left; padding: 1.25rem; margin-top: 1rem;">
                    <div style="font-weight: 800; color: var(--text-main); font-size: 1.1rem; margin-bottom: 1rem;">แบบฟอร์มลางาน</div>
                    <div style="display:flex; gap:0.5rem;">
                        <select id="leaveType" class="native-select" style="flex:1;">
                            <option value="" disabled selected>ประเภท</option>
                            <option value="ลาป่วย">ลาป่วย</option><option value="ลากิจ">ลากิจ</option><option value="พักร้อน">พักร้อน</option>
                        </select>
                        <input type="date" id="leaveDate" class="native-input" style="flex:1;">
                    </div>
                    <input type="text" id="leaveReason" class="native-input" placeholder="ระบุเหตุผลสั้นๆ (ถ้ามี)" style="margin-bottom:0;">
                </div>
                
                <div class="section-title">ประวัติการลาของคุณ</div>
                ${historyHtml}
            `;

            // Thumb Zone มีแค่ปุ่มยืนยัน
            thumbDiv.innerHTML = `
                <div class="thumb-actions">
                    <button class="btn btn-primary" onclick="submitLeave()">ส่งคำขอลางาน</button>
                </div>
            `;
        }

        function renderEmpSwap() {
            thumbDiv.innerHTML = '';
            let empOptions = '<option value="" disabled selected>เลือกเพื่อนที่ต้องการสลับ</option>';
            employees.filter(e => e.id !== currentUser.id).forEach(e => {
                empOptions += `<option value="${e.id}">${e.name}</option>`;
            });

            const mySwaps = requests.filter(r => r.empId === currentUser.id && r.reqType === 'SWAP');
            let historyHtml = mySwaps.length === 0 ? `<div class="empty-state">ไม่มีประวัติสลับวันหยุด</div>` : `<div class="list-group">`;
            mySwaps.forEach(req => {
                historyHtml += `
                    <div class="list-item">
                        <div class="item-main">
                            <span class="item-title">สลับกับ: ${req.targetEmpName}</span>
                            <span class="item-subtitle">วันที่: ${req.date}</span>
                        </div>
                        ${getStatusBadgeHtml(req.status)}
                    </div>`;
            });
            if(mySwaps.length > 0) historyHtml += `</div>`;

            // ย้ายฟอร์มกรอกมาไว้หน้าจอหลัก
            contentDiv.innerHTML = `
                <div class="card" style="text-align: left; padding: 1.25rem; margin-top: 1rem;">
                    <div style="font-weight: 800; color: var(--text-main); font-size: 1.1rem; margin-bottom: 1rem;">ขอสลับวันหยุด</div>
                    <select id="swapEmp" class="native-select">${empOptions}</select>
                    <div style="display:flex; gap:0.5rem; align-items:center; margin-bottom: 0;">
                        <span style="font-size:0.85rem; color:var(--text-muted); white-space:nowrap; font-weight:600;">วันที่เพื่อนแทน:</span>
                        <input type="date" id="swapDate" class="native-input" style="flex:1; margin-bottom: 0;">
                    </div>
                </div>

                <div class="section-title">ประวัติขอสลับวันหยุด</div>
                ${historyHtml}
            `;

            thumbDiv.innerHTML = `
                <div class="thumb-actions">
                    <button class="btn btn-primary" style="background: var(--warning-gradient);" onclick="submitSwap()">ส่งคำขอสลับวัน</button>
                </div>
            `;
        }

        /* =========================================
           ส่วนที่ 5: Views ฝั่งแอดมิน (Admin)
           ========================================= */
        function renderAdminDashboard() {
            clearInterval(clockInterval); thumbDiv.innerHTML = '';
            let workingCount = employees.filter(e => getEmployeeStatus(e.id) === 'IN').length;
            let pendingCount = requests.filter(r => r.status === 'PENDING').length;

            contentDiv.innerHTML = `
                <div class="section-title">ภาพรวมวันนี้</div>
                <div style="display: flex; gap: 0.75rem; margin-bottom: 1rem;">
                    <div class="card" style="flex: 1; padding: 1.2rem 1rem; margin: 0;">
                        <div style="font-size: 2.2rem; font-weight: 800; color: var(--primary); letter-spacing: -1px;">${employees.length}</div>
                        <div style="font-size: 0.8rem; font-weight: 600; color: var(--text-muted);">พนักงานรวม</div>
                    </div>
                    <div class="card" style="flex: 1; padding: 1.2rem 1rem; margin: 0;">
                        <div style="font-size: 2.2rem; font-weight: 800; color: #059669; letter-spacing: -1px;">${workingCount}</div>
                        <div style="font-size: 0.8rem; font-weight: 600; color: var(--text-muted);">เข้างานแล้ว</div>
                    </div>
                </div>
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; cursor:pointer; padding: 1.2rem;" onclick="navigateTo('admin-req')">
                    <div style="text-align:left;">
                        <div style="font-weight:800; font-size:1.05rem; color:var(--text-main);">คำขอรอดำเนินการ</div>
                        <div style="font-size:0.8rem; color:var(--text-muted);">ลางาน / สลับวันหยุด</div>
                    </div>
                    <div style="background: #fef3c7; color: #d97706; font-weight:800; font-size:1.2rem; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center;">${pendingCount}</div>
                </div>
            `;
        }

        function renderAdminEmployees() {
            clearInterval(clockInterval); thumbDiv.innerHTML = '';
            let listHTML = employees.length === 0 ? `<div class="empty-state">ยังไม่ได้เพิ่มรายชื่อพนักงาน</div>` : `<div class="list-group">`;
            employees.forEach(emp => {
                listHTML += `
                    <div class="list-item">
                        <div class="item-main">
                            <span class="item-title" style="margin:0;">${emp.name}</span><span class="item-subtitle">PIN: ${emp.pin}</span>
                        </div>
                        <button class="btn" style="width: auto; padding: 0.5rem 1rem; font-size: 0.8rem; background: rgba(225,29,72,0.1); color: #e11d48; border-radius: var(--radius-pill); margin: 0;" onclick="handleDeleteEmployee('${emp.id}')">ลบ</button>
                    </div>`;
            });
            if(employees.length > 0) listHTML += `</div>`;

            // ฟอร์มเพิ่มพนักงานย้ายมาหน้าจอหลัก
            contentDiv.innerHTML = `
                <div class="card" style="text-align: left; padding: 1.25rem; margin-top: 1rem;">
                    <div style="font-weight: 800; color: var(--text-main); font-size: 1.1rem; margin-bottom: 1rem;">+ เพิ่มพนักงานใหม่</div>
                    <div style="display:flex; gap:0.5rem; margin-bottom:0;">
                        <input type="text" id="newEmpName" class="native-input" placeholder="ชื่อพนักงาน" style="flex:2; margin-bottom:0;">
                        <input type="password" id="newEmpPin" class="native-input" placeholder="PIN 4 หลัก" maxlength="4" pattern="[0-9]*" inputmode="numeric" style="flex:1; text-align:center; margin-bottom:0;">
                    </div>
                </div>

                <div class="section-title">รายชื่อพนักงาน</div>
                ${listHTML}
            `;

            thumbDiv.innerHTML = `
                <div class="thumb-actions">
                    <button class="btn btn-primary" onclick="handleAddEmployee()">บันทึกข้อมูลพนักงาน</button>
                </div>
            `;
        }

        function renderAdminRequests() {
            clearInterval(clockInterval); thumbDiv.innerHTML = '';
            
            let listHTML = requests.length === 0 ? `<div class="empty-state">ไม่มีคำขอรอดำเนินการ</div>` : `<div class="list-group">`;
            requests.forEach(req => {
                let details = req.reqType === 'LEAVE' ? `${req.leaveType} (${req.date})` : `ขอสลับวันหยุดกับ ${req.targetEmpName} (${req.date})`;
                
                let actionBtns = req.status === 'PENDING' ? `
                    <div style="display:flex; gap:0.5rem; margin-top:1rem;">
                        <button class="btn btn-success" style="padding:0.7rem; font-size:0.9rem; border-radius:10px;" onclick="updateReqStatus('${req.id}', 'APPROVED')">อนุมัติ</button>
                        <button class="btn btn-outline" style="padding:0.7rem; font-size:0.9rem; color:#f43f5e; border-color:#f43f5e; border-radius:10px; background:rgba(244,63,94,0.05);" onclick="updateReqStatus('${req.id}', 'REJECTED')">ปฏิเสธ</button>
                    </div>
                ` : '';

                listHTML += `
                    <div class="list-item" style="display:block;">
                        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                            <div class="item-main">
                                <span class="item-title">${req.empName}</span>
                                <span class="item-subtitle" style="color:var(--text-main); font-weight:600;">${details}</span>
                                ${req.reason ? `<span class="item-subtitle" style="font-style:italic; margin-top:4px;">เหตุผล: ${req.reason}</span>` : ''}
                            </div>
                            ${getStatusBadgeHtml(req.status)}
                        </div>
                        ${actionBtns}
                    </div>`;
            });
            if(requests.length > 0) listHTML += `</div>`;

            contentDiv.innerHTML = `
                <div class="section-title" style="margin-top: 1rem;">จัดการคำขอ</div>
                ${listHTML}
            `;
        }

        /* =========================================
           ส่วนที่ 6: Router
           ========================================= */
        function navigateTo(page, pushState = true) {
            if (!adminPin && page !== 'setup') { window.location.hash = 'setup'; return; }
            if (adminPin && !currentUser && page !== 'login') { window.location.hash = 'login'; return; }

            if (currentUser && currentUser.role === 'admin') {
                if(page.startsWith('emp-')) page = 'admin-dash';
            } else if (currentUser && currentUser.role === 'emp') {
                if(page.startsWith('admin-')) page = 'emp-dash';
            }

            document.querySelectorAll('.nav-item').forEach(link => link.classList.remove('active'));
            const activeTab = document.getElementById('nav-' + page);
            if(activeTab) activeTab.classList.add('active');

            if(pushState) { window.location.hash = page; document.querySelector('main').scrollTop = 0; }

            if (page === 'setup') renderSetup();
            else if (page === 'login') renderLogin();
            else if (page === 'admin-dash') renderAdminDashboard();
            else if (page === 'admin-emp') renderAdminEmployees();
            else if (page === 'admin-req') renderAdminRequests();
            else if (page === 'emp-dash') renderEmpDashboard();
            else if (page === 'emp-leave') renderEmpLeave();
            else if (page === 'emp-swap') renderEmpSwap();
        }

        function handleRouting() {
            if(!isReady) return; 
            let page = window.location.hash.replace('#', '');
            if (!page) {
                if (!adminPin) page = 'setup';
                else if (!currentUser) page = 'login';
                else if (currentUser.role === 'admin') page = 'admin-dash';
                else page = 'emp-dash';
            }
            navigateTo(page);
        }

        window.addEventListener('hashchange', handleRouting);
    </script>
